services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: video_retrieval
      POSTGRES_USER: video
      POSTGRES_PASSWORD: video
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U video -d video_retrieval"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://video:video@postgres:5432/video_retrieval
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    ports:
      - "${API_PORT:-8001}:8000"
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://video:video@postgres:5432/video_retrieval
      PYTHONPATH: /app/src
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    gpus: all

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    ports:
      - "8080:80"

volumes:
  pgdata:
